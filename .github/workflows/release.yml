name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          MODULE=$(go list -m)
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/marp2pptx-linux-amd64        .
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/marp2pptx-linux-arm64        .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/marp2pptx-darwin-amd64       .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/marp2pptx-darwin-arm64       .
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/marp2pptx-windows-amd64.exe  .

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
